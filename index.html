<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOXSHIELD // Master Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600;700;900&family=VT323&display=swap');

        :root {
            /* DEFAULT: APPLE WHITE 3D */
            --bg-color: #f0f0f3; 
            --text-main: #1d1d1f; 
            --text-secondary: #86868b;
            --accent-1: #0071e3; 
            --alert: #ff3b30; 
            --hacker-green: #34c759;
            --shadow-light: #ffffff;
            --shadow-dark: #aeaec0;
            --panel-bg: #f0f0f3;
            --input-bg: #f0f0f3;
            --btn-bg: #f0f0f3;
            
            --font-head: 'Orbitron', sans-serif; 
            --font-body: 'Inter', sans-serif;
            --radius: 15px;
            --border-width: 0px;
        }

        /* 1. TEMA APPLE WHITE */
        [data-theme="apple"] { 
            --bg-color: #f0f0f3; --text-main: #1d1d1f; --text-secondary: #86868b;
            --accent-1: #0071e3; --alert: #ff3b30; --hacker-green: #34c759;
            --shadow-light: #ffffff; --shadow-dark: #aeaec0;
            --panel-bg: #f0f0f3; --input-bg: #f0f0f3; --btn-bg: #f0f0f3;
        }

        /* 2. TEMA JEAN DARK */
        [data-theme="jean_dark"] {
            --bg-color: #0f0a05; --text-main: #f39c12; --text-secondary: #8a631c;
            --accent-1: #f1c40f; --alert: #e74c3c; --hacker-green: #d35400;
            --shadow-light: rgba(243, 156, 18, 0.2); --shadow-dark: rgba(0, 0, 0, 0.9);
            --panel-bg: #0f0a05; --input-bg: #170f08; --btn-bg: #170f08;
        }

        /* 3. TEMA JEAN GREY */
        [data-theme="jean_grey"] {
            --bg-color: #3b3b3d; --text-main: #f39c12; --text-secondary: #a0a0a5;
            --accent-1: #f1c40f; --alert: #e74c3c; --hacker-green: #d35400;
            --shadow-light: rgba(243, 156, 18, 0.25); --shadow-dark: rgba(0, 0, 0, 0.7);
            --panel-bg: #3b3b3d; --input-bg: #323234; --btn-bg: #323234;
        }

        /* 4. TEMA GHOST */
        [data-theme="ghost"] {
            --bg-color: #f8f9fa; --text-main: #495057; --text-secondary: #adb5bd;
            --accent-1: #6c757d; --alert: #d90429; --hacker-green: #2ecc71;
            --shadow-light: #ffffff; --shadow-dark: #dee2e6;
            --panel-bg: #f8f9fa; --input-bg: #f8f9fa; --btn-bg: #f8f9fa;
        }

        /* 5. TEMA SILVER */
        [data-theme="silver"] {
            --bg-color: #e0e5ec; --text-main: #2d3436; --text-secondary: #636e72;
            --accent-1: #0984e3; --alert: #d63031; --hacker-green: #00b894;
            --shadow-light: #ffffff; --shadow-dark: #a3b1c6;
            --panel-bg: #e0e5ec; --input-bg: #e0e5ec; --btn-bg: #e0e5ec;
        }

        /* 6. TEMA STEALTH */
        [data-theme="stealth"] {
            --bg-color: #2c2c2e; --text-main: #f2f2f7; --text-secondary: #aeaeb2;
            --accent-1: #0a84ff; --alert: #ff453a; --hacker-green: #32d74b;
            --shadow-light: #3a3a3c; --shadow-dark: #1c1c1e;
            --panel-bg: #2c2c2e; --input-bg: #2c2c2e; --btn-bg: #2c2c2e;
        }

        /* 7. TEMA NEON MATRIX */
        [data-theme="neon"] {
            --bg-color: #0f0f13; --text-main: #00f2ff; --text-secondary: #747494;
            --accent-1: #ff00c1; --alert: #ff003c; --hacker-green: #00ffaa;
            --shadow-light: rgba(0, 242, 255, 0.2); --shadow-dark: rgba(0, 0, 0, 0.8);
            --panel-bg: #0f0f13; --input-bg: #15151a; --btn-bg: #15151a;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh; width: 100%;
            background: var(--bg-color); color: var(--text-main);
            font-family: var(--font-body); 
            overflow-x: hidden; overflow-y: auto; overscroll-behavior-y: auto; 
            text-transform: uppercase; transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* --- CANVAS MANAGEMENT --- */
        #matrix-canvas, #red-matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #matrix-canvas { z-index: -2; opacity: 0.2; }
        #red-matrix-canvas { z-index: 1; }

        /* --- INGRANAGGIO ADMIN 3D --- */
        .btn-admin-gear {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--btn-bg); color: var(--accent-1);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; transition: 0.3s;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            text-decoration: none;
        }
        .btn-admin-gear:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); transform: scale(0.95); }
        .gear-icon { animation: slow-spin 10s linear infinite; }
        @keyframes slow-spin { 100% { transform: rotate(360deg); } }

        /* --- TOP CTRL --- */
        .top-ctrl { position: fixed; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 100; }
        .btn-ctrl { 
            padding: 12px 20px; border-radius: 12px; cursor: pointer; 
            font-size: 0.7rem; font-family: var(--font-head); font-weight: 700;
            background: var(--btn-bg); color: var(--accent-1);
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); transition: 0.3s; 
        }
        .btn-ctrl:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        .logout-style { color: var(--alert); }

        /* --- WIDGET HUD ESTERNI --- */
        .jarvis-widget-tr {
            position: fixed; top: 90px; right: 40px; width: 70px; height: 70px; z-index: 10;
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 2s;
        }
        .master-ui.ready ~ .jarvis-widget-tr { opacity: 0.7; }
        .jw-ring { position: absolute; border-radius: 50%; border: 1px solid transparent; }
        .jw-1 { width: 100%; height: 100%; border-top: 2px solid var(--text-main); animation: spin 3s linear infinite; }
        .jw-2 { width: 70%; height: 70%; border-bottom: 2px dashed var(--accent-1); animation: spin-rev 5s linear infinite; }
        .jw-3 { width: 30%; height: 30%; border: 2px dotted var(--text-main); animation: spin 2s linear infinite; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-rev { 100% { transform: rotate(-360deg); } }

        /* --- MODALE AUTH --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(240, 240, 243, 0.6); backdrop-filter: blur(20px); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.7, 0, 0.2, 1);
        }

        .auth-container {
            width: 90%; max-width: 400px; border-radius: 30px;
            background: var(--panel-bg); padding: 40px; 
            box-shadow: 15px 15px 30px var(--shadow-dark), -15px -15px 30px var(--shadow-light);
            position: relative; overflow: hidden; box-sizing: border-box; transition: 0.5s;
        }

        .auth-container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--hacker-green); box-shadow: 0 0 15px var(--hacker-green);
            animation: scan-v 4s ease-in-out infinite; z-index: 5;
        }
        @keyframes scan-v { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        .auth-header { display: flex; justify-content: space-around; margin-bottom: 25px; }
        .auth-tab { padding: 12px; cursor: pointer; font-family: var(--font-head); font-weight: 700; font-size: 0.8rem; color: var(--text-secondary); transition: 0.3s; letter-spacing: 1px; }
        .auth-tab.active { color: var(--accent-1); border-bottom: 3px solid var(--accent-1); }

        .auth-form { display: none; flex-direction: column; gap: 15px; }
        .auth-form.active { display: flex; animation: fade-in 0.5s ease; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* INPUT SCAVATI */
        input { 
            background: var(--input-bg); border: none; border-radius: 12px;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            color: var(--text-main); padding: 16px; font-family: var(--font-body); font-weight: 700; font-size: 0.9rem; 
            outline: none; transition: 0.3s; box-sizing: border-box; width: 100%; 
        }
        input:focus { box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light); }

        /* BOTTONI RILIEVO */
        .btn-auth { 
            background: var(--btn-bg); color: var(--accent-1); border: none; border-radius: 15px;
            padding: 16px; font-family: var(--font-head); font-weight: 900; font-size: 0.9rem;
            cursor: pointer; margin-top: 10px; transition: 0.3s; width: 100%; 
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
        }
        .btn-auth:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); transform: scale(0.98); }

        .social-separator { margin: 25px 0; display: flex; align-items: center; text-align: center; font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); }
        .social-separator::before, .social-separator::after { content: ''; flex: 1; border-bottom: 1px solid var(--shadow-dark); margin: 0 10px;}
        
        .social-group { display: flex; flex-direction: column; gap: 15px; }
        .btn-social { 
            background: var(--btn-bg); border: none; border-radius: 15px; color: var(--text-main); font-weight: 700;
            padding: 14px; font-family: var(--font-body); font-size: 0.85rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; 
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }
        .btn-social:active { box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light); }
        .btn-social img { width: 18px; transition: 0.3s; }

        /* --- MASTER UI --- */
        .master-ui { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 1s; padding: 20px; box-sizing: border-box; position: relative; z-index: 5; }
        .master-ui.ready { opacity: 1; pointer-events: auto; }

        .responsive-title {
            font-family: var(--font-head); margin-bottom: 40px; font-weight: 900;
            font-size: clamp(1.2rem, 5vw, 3.5rem); letter-spacing: clamp(2px, 1.5vw, 15px);
            text-align: center; width: 100%; white-space: nowrap; color: var(--text-main);
            text-shadow: 2px 2px 4px var(--shadow-dark);
        }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 300px); gap: 40px; z-index: 5; }
        
        /* CARD IN RILIEVO 3D */
        .card { 
            border-radius: 35px; border: none; padding: 50px 20px; text-decoration: none;
            background: var(--panel-bg); cursor: pointer; text-align: center; position: relative; 
            box-shadow: 15px 15px 30px var(--shadow-dark), -15px -15px 30px var(--shadow-light);
            transition: 0.4s; display: block;
        }
        .card:active { box-shadow: inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light); transform: scale(0.98); }
        .card h2 { color: var(--accent-1); }

        #fox-logo { width: 140px; margin-bottom: 20px; position: relative; z-index: 2; border-radius: 30px; box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light); }

        /* --- GLITCH --- */
        #glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        #glitch-overlay.active { opacity: 1; pointer-events: auto; }
        .glitch-text { font-family: var(--font-head); font-size: 24px; font-weight: 900; color: var(--text-main); margin-bottom: 15px; }
        .glitch-code { color: var(--text-secondary); font-family: monospace; font-size: 12px; width: 80%; text-align: center; word-break: break-all; opacity: 0.7; }

        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: 1fr; gap: 25px; margin-top: 10px; width: 90%;}
            .card { padding: 35px 20px; }
            .auth-container { padding: 30px; width: 95%;}
            .btn-admin-gear { top: 10px; left: 10px; width: 40px; height: 40px; font-size: 20px; }
        }
    </style>
</head>
<body data-theme="apple">
    <canvas id="matrix-canvas"></canvas>
    <canvas id="red-matrix-canvas"></canvas>
    
    <a href="admin_panel.html" class="btn-admin-gear" title="Apri Admin Panel">
        <span class="gear-icon">⚙️</span>
    </a>

    <div class="top-ctrl">
        <div class="btn-ctrl logout-style" onclick="logout()">[ DISCONNETTI ]</div>
        <div class="btn-ctrl" onclick="toggleTheme()">[ STILE ]</div>
    </div>

    <div id="auth-overlay">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-tab active" id="tab-login" onclick="switchAuth('login')">LOGIN</div>
                <div class="auth-tab" id="tab-reg" onclick="switchAuth('reg')">REGISTRA</div>
            </div>

            <div id="form-login" class="auth-form active">
                <input type="text" placeholder="IDENTITY_ID" id="log-user">
                <input type="password" placeholder="SECURE_PASS" id="log-pass">
                <button class="btn-auth" onclick="eseguiLogin()">ACCESS_GRANTED</button>
            </div>

            <div id="form-reg" class="auth-form">
                <input type="text" placeholder="USERNAME" id="reg-user">
                <input type="email" placeholder="EMAIL_ENCRYPTED" id="reg-email">
                <input type="password" placeholder="MASTER_KEY" id="reg-pass">
                <button class="btn-auth" onclick="eseguiRegister()">INITIALIZE_PROFILE</button>
            </div>

            <div class="social-separator">OR CONNECT VIA</div>

            <div class="social-group">
                <button class="btn-social" onclick="bypassAuth()">
                    <img src="https://www.google.com/favicon.ico"> GOOGLE_CORE_AUTH
                </button>
            </div>
        </div>
    </div>

    <div id="glitch-overlay">
        <div class="glitch-text" data-text="CONNESSIONE AL NAS IN CORSO...">CONNESSIONE AL NAS IN CORSO...</div>
        <div id="glitch-hex" class="glitch-code"></div>
    </div>

    <div class="master-ui" id="main-ui">
        <img id="fox-logo" src="foxshield-logo2.jpg">
        <h1 class="responsive-title">FOXSHIELD_VAULT</h1>
        <div class="menu-grid">
            <a href="interface.html" class="card">
                <h2 style="font-family: var(--font-head); margin-bottom: 10px; font-weight: 900;">RECORDER</h2>
                <p style="font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); margin: 0;">Acquisizione Forense Operativa</p>
            </a>
            <div class="card" onclick="apriDatabaseConGlitch()">
                <h2 style="font-family: var(--font-head); margin-bottom: 10px; font-weight: 900;">DATABASE</h2>
                <p style="font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); margin: 0;">Terminale di Ricerca NAS</p>
            </div>
        </div>
    </div>

    <script>
        // LOGICA ORIGINALE INTONSA (Copia-Incolla)
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;

        const canvasG = document.getElementById('matrix-canvas');
        const ctxG = canvasG.getContext('2d');
        let dropsG = [];

        function initGreenMatrix() {
            canvasG.width = window.innerWidth;
            canvasG.height = window.innerHeight;
            const columns = canvasG.width / fontSize;
            dropsG = Array(Math.floor(columns)).fill(1);
        }

        function drawMatrixGreen() {
            ctxG.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctxG.fillRect(0, 0, canvasG.width, canvasG.height);
            ctxG.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-main'); 
            ctxG.font = fontSize + "px monospace";
            for (let i = 0; i < dropsG.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctxG.fillText(text, i * fontSize, dropsG[i] * fontSize);
                if (dropsG[i] * fontSize > canvasG.height && Math.random() > 0.975) dropsG[i] = 0;
                dropsG[i]++;
            }
        }

        const canvasR = document.getElementById('red-matrix-canvas');
        const ctxR = canvasR.getContext('2d');
        let dropsR = [];

        function initRedMatrix() {
            canvasR.width = window.innerWidth;
            canvasR.height = window.innerHeight;
            const columns = Math.floor(canvasR.width / fontSize);
            dropsR = Array(columns).fill(0);
            for(let i=0; i<columns; i++) dropsR[i] = Math.random() * -100;
        }

        function drawMatrixRed() {
            ctxR.clearRect(0, 0, canvasR.width, canvasR.height);
            ctxR.fillStyle = getComputedStyle(document.body).getPropertyValue('--alert'); 
            ctxR.font = (fontSize - 1) + "px monospace";
            for (let i = 0; i < dropsR.length; i++) {
                let y = dropsR[i] * fontSize;
                if (y > 0) {
                    const text = letters.charAt(Math.floor(Math.random() * letters.length));
                    ctxR.fillText(text, i * fontSize, y);
                }
                if (y >= canvasR.height) dropsR[i] = Math.random() * -20; 
                else dropsR[i] += 0.8; 
            }
        }

        window.addEventListener('resize', () => { initGreenMatrix(); initRedMatrix(); });
        initGreenMatrix(); initRedMatrix();
        setInterval(() => { drawMatrixGreen(); drawMatrixRed(); }, 50);

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('foxshield_logged_in') === 'true') {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-ui').classList.add('ready');
            }
        });

        function switchAuth(mode) {
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-reg').classList.toggle('active', mode === 'reg');
            document.getElementById('form-login').classList.toggle('active', mode === 'login');
            document.getElementById('form-reg').classList.toggle('active', mode === 'reg');
        }

        async function eseguiLogin() {
            const u = document.getElementById('log-user').value;
            const p = document.getElementById('log-pass').value;
            try {
                const response = await fetch('auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', username: u, password: p })
                });
                const res = await response.json();
                if (res.status === 'success') {
                    localStorage.setItem('foxshield_logged_in', 'true');
                    localStorage.setItem('foxshield_user', res.username);
                    localStorage.setItem('foxshield_operator_id', res.operatore);
                    bypassAuth();
                } else { alert(res.msg); }
            } catch (e) { alert("ERRORE DI CONNESSIONE AL DATABASE NAS"); }
        }

        async function eseguiRegister() {
            const u = document.getElementById('reg-user').value;
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-pass').value;
            try {
                const response = await fetch('auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', username: u, password: p, email: e })
                });
                const res = await response.json();
                alert(res.msg);
                if (res.status === 'success') switchAuth('login');
            } catch (e) { alert("ERRORE DURANTE LA REGISTRAZIONE"); }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                localStorage.setItem('foxshield_logged_in', 'true');
                localStorage.setItem('foxshield_user', 'TEST_OPERATOR');
                localStorage.setItem('foxshield_operator_id', 'jean@live.it');
                bypassAuth();
            }
        });

        function bypassAuth() {
            document.getElementById('auth-overlay').style.transform = 'scale(2)';
            document.getElementById('auth-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-ui').classList.add('ready');
            }, 800);
        }

        function logout() {
            localStorage.removeItem('foxshield_logged_in');
            window.location.reload();
        }

        /* --- AGGIORNATA FUNZIONE TEMI (7 STILI) --- */
        function toggleTheme() {
            const themes = ['apple', 'jean_dark', 'jean_grey', 'ghost', 'silver', 'stealth', 'neon'];
            let current = document.body.getAttribute('data-theme') || 'apple';
            let next = themes[(themes.indexOf(current) + 1) % themes.length];
            document.body.setAttribute('data-theme', next);
        }

        function apriDatabaseConGlitch() {
            const glitchOverlay = document.getElementById('glitch-overlay');
            const hexContainer = document.getElementById('glitch-hex');
            glitchOverlay.classList.add('active');
            let hexInterval = setInterval(() => {
                let hexStr = '';
                for(let i=0; i<100; i++) hexStr += Math.floor(Math.random()*16).toString(16).toUpperCase() + ' ';
                hexContainer.innerText = hexStr;
            }, 50);
            setTimeout(() => {
                clearInterval(hexInterval);
                window.location.href = 'database.html';
            }, 1500);
        }
    </script>
</body>
</html>
