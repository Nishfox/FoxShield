<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SpiderWeb | FoxShield</title>
    <style>
        :root { --bg: #020617; --orange: #f59e0b; }
        body { background: var(--bg); color: white; display: flex; height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
        .sidebar { width: 350px; background: rgba(15, 23, 42, 0.95); border-right: 2px solid var(--orange); padding: 30px; z-index: 10; }
        .logo img { width: 120px; display: block; margin: 0 auto 20px; filter: drop-shadow(0 0 10px var(--orange)); }
        .back-btn { display: block; margin-top: 30px; color: #64748b; text-decoration: none; text-align: center; border: 1px solid #333; padding: 10px; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; }
    </style>
</head>
<body>
    <canvas id="net"></canvas>
    <div class="sidebar">
        <div class="logo"><img src="../image/foxshield-logo.jpg" alt="NF Logo"></div>
        <h2 style="text-align: center; letter-spacing: 5px;">SPIDER_WEB</h2>
        <input type="text" placeholder="TARGET IP / NICKNAME..." style="width: 100%; background: black; border: 1px solid var(--orange); color: var(--orange); padding: 10px; margin-top: 20px;">
        <a href="../index.html" class="back-btn">🔙 RITORNA AL TERMINALE</a>
    </div>
    <script>
        const canvas = document.getElementById('net'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function draw() {
            ctx.clearRect(0,0, canvas.width, canvas.height); ctx.strokeStyle = "#f59e0b"; ctx.lineWidth = 0.5;
            for(let i=0; i<30; i++) {
                ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height/2);
                ctx.lineTo(Math.random()*canvas.width, Math.random()*canvas.height); ctx.stroke();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
