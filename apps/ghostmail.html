<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostMail | FoxShield Secure Terminal</title>
    <style>
        :root {
            --bg: #020617;
            --neon-blue: #0ea5e9;
            --neon-orange: #f59e0b;
            --neon-red: #ef4444;
            --card-bg: rgba(15, 23, 42, 0.8);
            --border: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SFONDO ANIMATO CYBER */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* CONTAINER PRINCIPALE */
        .terminal {
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 30px;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.2);
            position: relative;
        }

        /* HEADER AGGRESSIVO */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .shield-icon {
            font-size: 30px;
            color: var(--neon-orange);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px var(--neon-orange); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* BOX EMAIL GENERATA */
        .email-display {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-blue);
            padding: 20px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }

        .email-display span {
            font-size: 20px;
            color: #10b981;
            font-weight: bold;
        }

        .btn-action {
            background: var(--neon-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn-action:hover {
            background: var(--neon-orange);
            transform: scale(1.05);
        }

        /* TIMER AUTODISTRUZIONE */
        .destruct-timer {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            color: var(--neon-red);
            text-transform: uppercase;
        }

        #timer-val { font-weight: 900; font-size: 24px; }

        /* INBOX TERMINAL STYLE */
        .inbox {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            height: 250px;
            overflow-y: auto;
            padding: 15px;
        }

        .inbox-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mail-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 10px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .mail-item:hover {
            border-color: var(--neon-blue);
            background: rgba(14, 165, 233, 0.1);
        }

        /* ANIMAZIONE DISTRUZIONE MESSAGGIO */
        .burn {
            animation: burnAway 0.8s forwards;
            pointer-events: none;
        }

        @keyframes burnAway {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05) skewX(-10deg); filter: brightness(2) sepia(1) hue-rotate(-50deg); opacity: 0.8; }
            100% { transform: scale(0); filter: brightness(5); opacity: 0; }
        }

        .glitch-text {
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <canvas id="particles-js"></canvas>

    <div class="terminal">
        <div class="header">
            <h1 class="glitch-text">GHOST-MAIL PROTOCOL</h1>
            <div class="shield-icon">🛡️</div>
        </div>

        <div class="destruct-timer">
            DISTRUZIONE TRACCE TRA: <span id="timer-val">10:00</span>
        </div>

        <div class="email-display">
            <span id="email-addr">SHADOW-FOX-772@NF.ZONE</span>
            <button class="btn-action" onclick="copyEmail()">COPIA HASH</button>
        </div>

        <div class="inbox">
            <div class="inbox-title">
                <span>[INCOMING MESSAGES]</span>
                <span style="color: var(--neon-orange)">● LIVE SCANNER</span>
            </div>
            
            <div id="mail-list">
                <div class="mail-item" onclick="burnMessage(this)">
                    <div style="color: var(--neon-blue); font-weight: bold;">DA: SECURITY-CORE</div>
                    <div style="font-size: 13px; margin-top: 5px;">OGGETTO: Token di accesso temporaneo 4492-X</div>
                    <div style="font-size: 10px; margin-top: 10px; color: var(--neon-red);">[CLICCA PER DISTRUGGERE ORA]</div>
                </div>
            </div>
        </div>

        <div style="margin-top: 20px; font-size: 10px; color: #475569; text-align: center;">
            STATUS: CRITTOGRAFIA FOXSHIELD ATTIVA | NO LOGS | P2P ENCRYPTION
        </div>
    </div>

    <script>
        // --- ANIMAZIONE SFONDO (Pioggia di particelle) ---
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const chars = "010101ABCDEF-🔒-🛡️";

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 15 + 5;
                this.speed = Math.random() * 2 + 1;
                this.char = chars[Math.floor(Math.random() * chars.length)];
            }
            draw() {
                ctx.fillStyle = "rgba(14, 165, 233, 0.3)";
                ctx.font = this.size + "px monospace";
                ctx.fillText(this.char, this.x, this.y);
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
        }

        for (let i = 0; i < 50; i++) { particles.push(new Particle()); }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- LOGICA EMAIL ---
        function copyEmail() {
            const email = document.getElementById('email-addr').innerText;
            navigator.clipboard.writeText(email);
            alert("🔒 INDIRIZZO CRIPTATO COPIATO");
        }

        // Timer
        let time = 600;
        setInterval(() => {
            if (time <= 0) return;
            time--;
            const m = Math.floor(time / 60);
            const s = time % 60;
            document.getElementById('timer-val').innerText = `${m}:${s < 10 ? '0' + s : s}`;
        }, 1000);

        // Funzione Autodistruzione (Burn)
        function burnMessage(el) {
            el.classList.add('burn');
            setTimeout(() => {
                el.remove();
                // Simula arrivo nuova mail dopo distruzione
                setTimeout(addNewMail, 2000);
            }, 800);
        }

        function addNewMail() {
            const list = document.getElementById('mail-list');
            const newItem = document.createElement('div');
            newItem.className = 'mail-item';
            newItem.innerHTML = `
                <div style="color: var(--neon-orange); font-weight: bold;">DA: ANONYMOUS-RELAY</div>
                <div style="font-size: 13px; margin-top: 5px;">OGGETTO: Dati inviati tramite FoxTunnel</div>
                <div style="font-size: 10px; margin-top: 10px; color: var(--neon-red);">[CLICCA PER DISTRUGGERE ORA]</div>
            `;
            newItem.onclick = function() { burnMessage(this); };
            list.prepend(newItem);
        }
    </script>
</body>
</html>
